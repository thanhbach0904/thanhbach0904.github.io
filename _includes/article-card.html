{% assign p = include.post %}
<article class="article-card {% if include.size %}article-card--{{ include.size }}{% endif %}">
  {% if p.image %}
  <a href="{{ p.url | relative_url }}" class="card-image-link">
    <div class="card-image">
      <img src="{{ p.image | relative_url }}" alt="{{ p.title }}" loading="lazy" />
    </div>
  </a>
  {% endif %}
  <div class="card-body">
    {% if p.tag %}
    <a href="{{ '/tag/' | append: p.tag | append: '/' | relative_url }}" class="card-tag">{{ p.tag | capitalize }}</a>
    {% endif %}
    <h2 class="card-title">
      <a href="{{ p.url | relative_url }}">{{ p.title }}</a>
    </h2>
    {% if p.description %}
    <p class="card-description">{{ p.description }}</p>
    {% endif %}
    {% if p.read_time %}
    <span class="card-read-time">{{ p.read_time }} min read</span>
    {% endif %}
  </div>
</article>
